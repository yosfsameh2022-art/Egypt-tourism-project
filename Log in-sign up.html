<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>

    <div>

        <span>X</span>

        <div>
            <button>Login</button>
            <button>Sign Up</button>
        </div>

        <hr>

        <div>
            <h2>Login</h2>

            <form>
                <label>Email Address:</label><br>
                <input type="email" placeholder="your@email.com" required><br><br>

                <label>Password:</label><br>
                <input type="password" placeholder="Enter password" minlength="8" maxlength="16" required><br><br>

                <button type="submit">Login</button>
            </form>
        </div>

        <hr>

        <div>
            <h2>Sign Up</h2>

            <form>
                <label>Full Name:</label><br>
                <input type="text" placeholder="Your full name" required><br><br>

                <label>Email Address:</label><br>
                <input type="email" placeholder="your@email.com" required><br><br>

                <label>Password:</label><br>
                <input type="password" placeholder="Min. 8 characters" minlength="8" maxlength="16" required><br><br>

                <label>Confirm Password:</label><br>
                <input type="password" placeholder="Repeat password" minlength="8" maxlength="16" required><br><br>

                <button type="submit">Create Account</button>
            </form>
        </div>

    </div>

</body>
</html>
