<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Profile</title>
    <link rel="stylesheet" href="profile.css" />
  </head>
  <body>
    <!--LINKS-->
    <nav class="navbar">
    <div class="logo">MISR LEGACY</div>
    <div class="links">
        <a href="Indexx.html">Home</a>
        <a href="Searchh.html">Search</a>
        <a href="Gallery.html">Gallery</a>
        <a href="Tickets.html">Tickets</a>
        <a href="Contact.html">Contact us</a>
        <a href="Artifact Details.html">Artifact Details</a>
        <a href="Profile.html">Profile</a>
    </div>
    <div class="auth-buttons">
        <a href="Log in-sign up.html" class="btn-login">LOGIN</a>
        <a href="Log in-sign up.html" class="btn-signup">SIGN UP</a>
    </div>
</nav>

    <br />
    <hr />
    <!-- PROFILE PICTURE -->
    <div class="avatar-section">
      <img id="avatar-img" src="" alt="profile picture" />
      <div id="avatar-initials">PP</div>
      <br />
      <label
        >Change Photo:
        <input type="file" accept="image/*" onchange="inputAvatar(this)"
      /></label>
    </div>

    <br />
    <hr />

    <!-- VIEW  -->
    <div id="view-info">
      <h3>My Profile</h3>
      <table>
        <tr>
          <td><b>Name</b></td>
          <td id="full-name"></td>
        </tr>
        <tr>
          <td><b>Email</b></td>
          <td id="email"></td>
        </tr>
        <tr>
          <td><b>Gender</b></td>
          <td id="gender"></td>
        </tr>
        <tr>
          <td><b>Nationality</b></td>
          <td id="nationality"></td>
        </tr>
        <tr>
          <td><b>Date of Birth</b></td>
          <td id="dob"></td>
        </tr>
      </table>
      <br />
      <button onclick="showEdit()">Edit Profile</button>
    </div>

    <!-- EDIT -->
    <div id="edit-info" class="hidden">
      <h3>Edit Profile</h3>
      <table>
        <tr>
          <td><b>Name</b></td>
          <td><input type="text" id="e-name" /></td>
        </tr>
        <tr>
          <td><b>Email</b></td>
          <td><input type="email" id="e-email" /></td>
        </tr>
        <tr>
          <td><b>Gender</b></td>
          <td>
            <select id="e-gender">
              <option>Female</option>
              <option>Male</option>
              <option>Prefer not to say</option>
            </select>
          </td>
        </tr>
        <tr>
          <td><b>Nationality</b></td>
          <td>
            <select id="e-nationality">
              <option value="Egyptian">Egyptian</option>
              <option value="Other">Other</option>
            </select>
          </td>
        </tr>
        <tr>
          <td><b>Date of Birth</b></td>
          <td><input type="date" id="e-dob" /></td>
        </tr>
      </table>
      <br />
      <button onclick="saveInfo()">Save</button>
    </div>

    <hr />

    <!-- MY TICKETS -->
    <div>
      <h3>My Tickets</h3>
      <table>
        <tr>
          <th>Monument</th>
          <th>Date</th>
          <th>Tickets</th>
        </tr>
        <tr>
          <td></td>
          <td></td>
          <td></td>
        </tr>
        <tr>
          <td></td>
          <td></td>
          <td></td>
        </tr>
      </table>
    </div>
    <script src="profile.js"></script>
  </body>
</html>
