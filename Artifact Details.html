<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="page-title">Heritage Site</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styleee.css" />
</head>

<body>

    <!-- HERO -->
    <section class="hero">
        <div class="hero-bg" id="hero-bg"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="hero-tag">Egyptian Heritage</div>
            <h1 class="hero-title" id="hero-title"></h1>
            <p class="hero-subtitle" id="hero-subtitle"></p>
            <div class="hero-meta" id="hero-meta"></div>
        </div>
    </section>

    <!-- STATS -->
    <section class="section">
        <div class="section-label">AT A GLANCE</div>
        <div class="section-title">Key Facts</div>
        <div class="stats-grid" id="stats-grid"></div>
    </section>

    <!-- ABOUT -->
    <section class="section">
        <div class="section-label">OVERVIEW</div>
        <div class="section-title">About</div>
        <p class="about-text" id="about-text"></p>
    </section>

    <!-- TIMELINE -->
    <section class="section">
        <div class="section-label">TIMELINE</div>
        <div class="section-title">History</div>
        <div class="timeline" id="timeline"></div>
    </section>

    <!-- VISIT -->
    <section class="section">
        <div class="section-label">PLAN YOUR VISIT</div>
        <div class="section-title">Visitor Info</div>
        <div class="visit-grid" id="visit-grid"></div>
        <a class="map-link" id="map-link" target="_blank">Open in Google Maps ↗</a>
    </section>

    <!-- FACTS -->
    <section class="section">
        <div class="section-label">DID YOU KNOW</div>
        <div class="section-title">Interesting Facts</div>
        <div class="facts-grid" id="facts-grid"></div>
    </section>

    <!-- FOOTER -->
    <footer>
        <div class="footer-brand">Egyptian Heritage</div>
        <div class="footer-note" id="footer-note"></div>
    </footer>

    <!-- DATA -->
    <script src="data.js"></script>

</body>

</html>
