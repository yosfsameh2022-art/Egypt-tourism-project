<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>

    <header>
        <h1>Contact Us</h1>
        <p>Get in touch with us</p>
    </header>

    <main>
        <div>
            <h2>Send a Message</h2>

            <form>
                <label for="name">Full Name:</label><br>
                <input type="text" id="name" name="name" placeholder="Enter Your name"><br><br>

                <label for="email">Email Address:</label><br>
                <input type="email" id="email" name="email" placeholder="Enter your@email.com"><br><br>

                <label for="subject">Subject:</label><br>
                <input type="text" id="subject" name="subject" placeholder="Enter subject"><br><br>

                <label for="Comment">Comment:</label><br>
                <textarea id="Comment" name="Comment" rows="5" cols="40" placeholder="Write your Comment..."></textarea><br><br>

                <button type="submit">Send Message</button>
            </form>
        </div>

        <hr>

        <div>
            <h2>Visit Us</h2>

            <p><strong>Address:</strong> Grand Egyptian Museum, Giza, Egypt</p>
            <p><strong>Phone:</strong> +20 2 3531 7300</p>
            <p><strong>Email:</strong> info@gem.gov.eg</p>
        
            <p><strong>Working Hours:</strong></p>
            <p>Daily: 9:00 AM - 5:00 PM</p>
        </div>

        <hr>

    </main>

    <!-- Footer -->
    <footer>
        <p>© 2026 Your Website</p>
    </footer>

</body>
</html>
