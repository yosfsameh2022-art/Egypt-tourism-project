    <br />
    <hr>
    <!-- PROFILE PICTURE -->
    <div>
      <img id="avatar-img" src="" alt="" />
      <div id="avatar-initials">PP</div>
      <br />
      <label>Change Photo: <input type="file" accept="image/*" /></label>
    </div>

    <br />
    <hr />

    <!-- VIEW  -->
    <div id="view-info">
      <h3>My Profile</h3>
      <table>
        <tr>
          <td><b>Name</b></td>
          <td id="full-name"></td>
        </tr>
        <tr>
          <td><b>Email</b></td>
          <td id="email"></td>
        </tr>
        <tr>
          <td><b>City</b></td>
          <td id="city"></td>
        </tr>
        <tr>
          <td><b>Gender</b></td>
          <td id="gender"></td>
        </tr>
        <tr>
          <td><b>Nationality</b></td>
          <td id="nationality"></td>
        </tr>
        <tr>
          <td><b>Date of Birth</b></td>
          <td id="dob"></td>
        </tr>
      </table>
      <br />
      <button>Edit Profile</button>
    </div>

    <!-- EDIT -->
    <div id="edit-info">
      <h3>Edit Profile</h3>
      <table>
        <tr>
          <td><b>Name</b></td>
          <td><input type="text" id="full-name" /></td>
        </tr>
        <tr>
          <td><b>Email</b></td>
          <td><input type="email" id="email" /></td>
        </tr>
        <tr>
          <td><b>City</b></td>
          <td><input type="text" id="city" /></td>
        </tr>
        <tr>
          <td><b>Gender</b></td>
          <td>
            <select id="gender">
              <option>Male</option>
              <option>Female</option>
              <option>Prefer not to say</option>
            </select>
          </td>
        </tr>
        <tr>
          <td><b>Nationality</b></td>
          <td><input type="text" id="nationality" /></td>
        </tr>
        <tr>
          <td><b>Date of Birth</b></td>
          <td><input type="date" id="dob" /></td>
        </tr>
      </table>
      <br />
      <button>Save</button>
    </div>

    <hr />

    <!-- MY TICKETS -->
    <h3>My Tickets</h3>
    <table>
      <tr>
        <th>Monument</th>
        <th>Date</th>
        <th>Tickets</th>
      </tr>
      <tr>
        <td></td>
        <td></td>
        <td></td>
      </tr>
      <tr>
        <td></td>
        <td></td>
        <td></td>
      </tr>
      
    </table>
